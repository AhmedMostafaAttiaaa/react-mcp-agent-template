# Generation provider: "groq" (hosted, fast, default here — needs GROQ_API_KEY in .env) or
# "ollama" (fully local, zero API keys, zero network calls outside your own host). See README.md.
provider: groq

ollama:
  # If null, the first non-embedding model returned by `ollama list` on OLLAMA_HOST is used.
  # Left explicit here because this OLLAMA_HOST (see .env) is a shared LAN server that also
  # hosts non-chat specialist models (OCR/vision-only) — auto-pick can't tell those apart from
  # a general chat model, so it's pinned to a known-good one instead.
  model: llama3:latest

groq:
  # Only read when provider: groq. See https://console.groq.com/docs/models for options.
  model: llama-3.1-8b-instant

embedding:
  # Embeddings always run locally through Ollama, regardless of the generation provider.
  provider: ollama
  model: nomic-embed-text

temperature: 0.2
max_steps: 8

mcp:
  servers:
    - name: example
      command: ["python", "tools/example_server.py"]
    - name: rag
      command: ["python", "tools/rag_server.py"]
    - name: chunking
      command: ["python", "tools/chunking_server.py"]

skills:
  directory: skills
  max_active_skills: 2

logging:
  traces_dir: traces
  level: INFO

base_prompt_path: agent/base_prompt.txt

safety:
  # Terms here (see agent/blocklist.example.txt) plus a fixed set of prompt-injection
  # patterns are checked before user input ever reaches the LLM. Blocked input short-circuits
  # the whole ReAct loop with a fixed refusal — no model call happens at all.
  blocklist_path: agent/blocklist.txt

rag:
  mode: vector # "vector" or "graph"
  chunk_size: 300 # words per chunk
  chunk_overlap: 55 # words of overlap between consecutive chunks
  vector_store_dir: data/vector_store
  graph_store_path: data/graph_store/graph.pkl
  max_file_size_mb: 50
  # Graph mode makes one LLM call per chunk (entity/relationship extraction).
  # The UI blocks graph builds above this cap until you raise it here yourself.
  graph_chunk_cap: 200
